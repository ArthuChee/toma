<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* SEÇÕES */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
flex-direction:column;
background-size:cover;
background-position:center;
}

/* CAPA */
.capa{
height:100vh;
background:url('capa.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* TITULO */
h1{
font-family:'Playfair Display',serif;
font-size:50px;
color:white;
text-shadow:0 0 15px rgba(0,0,0,0.7);
}

/* BOTÃO */
.botao{
padding:15px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d88,#ff99ac);
color:white;
font-size:18px;
cursor:pointer;
animation:batida 1.2s infinite;
}

@keyframes batida{
0%{transform:scale(1);}
14%{transform:scale(1.15);}
28%{transform:scale(1);}
42%{transform:scale(1.15);}
70%{transform:scale(1);}
100%{transform:scale(1);}
}

/* TEXTO */
.texto{
font-size:22px;
max-width:700px;
line-height:1.8;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
padding:25px;
border-radius:20px;
color:#ffe4ec;
}

/* FUNDOS */
.fundo1{
background:url('fundo1.jpg') center/cover no-repeat;
}

.fundo2{
background:url('fundo2.jpg') center/cover no-repeat;
}

.fundo3{
background:url('fundo3.jpg') center/cover no-repeat;
}

.fundo4{
background:url('fundo4.jpg') center/cover no-repeat;
}

.fundoFinal{
background:url('fundoFinal.jpg') center/cover no-repeat;
}

/* FOTOS */
.fotos{
gap:20px;
}

.fotos img{
width:90%;
max-width:350px;
height:500px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* BOTÃO SECRETO */
#segredo{
opacity:0;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:transparent;
color:#ff9bb3;
font-size:16px;
border:1px solid #ff9bb3;
cursor:pointer;
transition:0.3s;
}

#segredo:hover{
background:#ff4d88;
color:white;
transform:scale(1.05);
box-shadow:0 5px 15px rgba(255,0,100,0.4);
}

/* SURPRESA */
#surpresa{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
z-index:999;
}

.conteudo-surpresa{
text-align:center;
padding:20px;
}

#surpresa p{
color:#ffd6e0;
font-size:40px;
transform:scale(0.8);
transition:1s;
}

#surpresa.ativo{
opacity:1;
pointer-events:auto;
}

#surpresa.ativo p{
transform:scale(1.1);
}

/* BOTÃO VOLTAR */
.conteudo-surpresa button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.conteudo-surpresa button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(255,0,100,0.4);
}

</style>
</head>

<body>

<!-- CAPA -->
<div class="capa">

<h1>Para Você 💖</h1>

<button class="botao" onclick="iniciar()">
Abrir Carta
</button>

</div>

<!-- FRASE 1 -->
<section class="fundo1">

<p class="texto" id="msg1"></p>

</section>

<!-- FOTOS 1 -->
<section class="fundo2 fotos">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">

</section>

<!-- FRASE 2 -->
<section class="fundo3">

<p class="texto" id="msg2"></p>

</section>

<!-- FOTOS 2 -->
<section class="fundo4 fotos">

<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
<img src="foto8.jpg">

</section>

<!-- FINAL -->
<section class="fundoFinal">

<p class="texto">
E mesmo depois de tudo...
eu ainda escolheria você em todas as versões da minha vida 💖
</p>

<button id="segredo" onclick="mostrar()">
Descubra 💌
</button>

</section>

<!-- SURPRESA -->
<div id="surpresa">

<div class="conteudo-surpresa">

<p>
Eu te escolheria<br>
em todas as vidas ❤️
</p>

<button onclick="fecharSurpresa()">
Voltar 💖
</button>

</div>

</div>

<!-- AUDIOS -->
<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<audio id="batidaSom">
<source src="batida.mp3">
</audio>

<script>

/* TEXTOS */

const texto1 = `
Desde que você entrou na minha vida,
tudo ficou mais bonito.

Seu sorriso virou meu lugar favorito...
`;

const texto2 = `
Cada momento com você
se tornou especial.

E eu só queria viver tudo isso
pra sempre 💖
`;

let i = 0;
let j = 0;

/* INICIO */

function iniciar(){

document.getElementById("musica").play();

const batida = document.getElementById("batidaSom");

batida.volume = 0.3;

batida.play();

setTimeout(()=>{
batida.pause();
},5000);

document.querySelector(".fundo1").scrollIntoView();

escrever1();

}

/* DIGITAÇÃO */

function escrever1(){

if(i < texto1.length){

document.getElementById("msg1").innerHTML += texto1.charAt(i);

i++;

setTimeout(escrever1,40);

}else{

setTimeout(escrever2,2000);

}

}

function escrever2(){

if(j < texto2.length){

document.getElementById("msg2").innerHTML += texto2.charAt(j);

j++;

setTimeout(escrever2,40);

}

}

/* BOTÃO SECRETO */

setTimeout(()=>{

document.getElementById("segredo").style.opacity="1";

},8000);

/* SURPRESA */

function mostrar(){

document.getElementById("surpresa").classList.add("ativo");

}

function fecharSurpresa(){

document.getElementById("surpresa").classList.remove("ativo");

}

</script>

</body>
</html>
