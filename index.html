<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f0f,#1a1a2e,#16213e);
    font-family:'Poppins',sans-serif;
    color:white;
    position:relative;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:brilho 2s infinite alternate;
}

@keyframes brilho{
    from{opacity:0.2;}
    to{opacity:1;}
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:700px;
    padding:50px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(255,255,255,0.08);
    text-align:center;
    animation:entrada 1.5s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-family:'Playfair Display',serif;
    font-size:55px;
    margin-bottom:20px;
    color:#ffd6e0;
}

.sub{
    opacity:0.8;
    margin-bottom:35px;
    font-size:18px;
}

button{
    padding:16px 35px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff4d88,#ff99ac);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 0 25px rgba(255,77,136,0.4);
}

button:hover{
    transform:scale(1.07);
    box-shadow:0 0 40px rgba(255,77,136,0.7);
}

#conteudo{
    margin-top:35px;
    display:none;
    animation:fade 2s ease;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

#texto{
    font-size:22px;
    line-height:1.9;
    color:#f5f5f5;
    white-space:pre-line;
}

img{
    width:260px;
    margin-top:30px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
    transition:0.5s;
}

img:hover{
    transform:scale(1.03);
}

audio{
    margin-top:25px;
    width:100%;
}

.heart{
    position:absolute;
    color:#ff7aa2;
    animation:subir linear infinite;
    opacity:0.7;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:0;
    }

    to{
        transform:translateY(-120vh);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="background" id="background"></div>

<div class="card">

<h1>Para Você ✨</h1>

<p class="sub">
Existe algo em você que deixa tudo mais bonito.
</p>

<button onclick="abrirCarta()">
Abrir Carta 💌
</button>

<div id="conteudo">

<p id="texto"></p>

<img src="foto.jpg" alt="Nossa foto">

<audio id="musica" controls loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script>

const mensagem = `
Desde que você apareceu,
alguma coisa mudou em mim.

Os dias ficaram mais leves,
os detalhes ganharam sentido,
e o seu sorriso virou meu lugar favorito.

Talvez esse site não consiga mostrar tudo o que eu sinto,
mas queria que você soubesse:

você é uma das coisas mais especiais que já aconteceram na minha vida. ✨
`;

let i = 0;

function abrirCarta(){

    document.getElementById('conteudo').style.display = 'block';

    document.getElementById('musica').play();

    escrever();

}

function escrever(){

    if(i < mensagem.length){

        document.getElementById('texto').innerHTML += mensagem.charAt(i);

        i++;

        setTimeout(escrever,45);
    }
}

function criarEstrelas(){

    const bg = document.getElementById('background');

    for(let i=0;i<80;i++){

        const star = document.createElement('div');

        star.classList.add('star');

        star.style.left = Math.random()*100 + 'vw';

        star.style.top = Math.random()*100 + 'vh';

        star.style.animationDuration = Math.random()*3 + 1 + 's';

        bg.appendChild(star);
    }
}

criarEstrelas();

function criarCoracao(){

    const heart = document.createElement('div');

    heart.classList.add('heart');

    heart.innerHTML = '❤';

    heart.style.left = Math.random()*100 + 'vw';

    heart.style.fontSize = Math.random()*20 + 15 + 'px';

    heart.style.animationDuration = Math.random()*5 + 5 + 's';

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(criarCoracao,400);

</script>

</body>
</html>
