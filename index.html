<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você 💖</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* SEÇÕES */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
flex-direction:column;
}

/* INICIO */
.inicio{
background:url('fundo1.jpg') center/cover no-repeat;
}

/* BOTÃO */
button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
}

/* TEXTOS */
.texto{
background:url('fundo2.jpg') center/cover no-repeat;
position:relative;
}

.texto::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.texto p{
position:relative;
font-size:22px;
max-width:700px;
line-height:1.8;
color:#ffe4ec;
}

/* FOTOS */
.fotos{
gap:20px;
}

.fotos img{
width:90%;
max-width:350px;
border-radius:20px;
}

/* FINAL */
.final{
gap:20px;
font-size:22px;
}

#segredo{
opacity:0;
transition:1s;
}

/* CORAÇÕES */
.heart{
position:fixed;
top:-10%;
color:#ff7aa2;
animation:cair linear infinite;
}

@keyframes cair{
to{
transform:translateY(120vh);
}
}

</style>
</head>

<body>

<!-- INICIO -->
<section class="inicio">
<h1>Para Você 💖</h1>
<button onclick="iniciar()">Abrir Carta</button>
</section>

<!-- FRASES 1 -->
<section class="texto" id="texto1">
<p id="msg1"></p>
</section>

<!-- FOTOS 1 -->
<section class="fotos">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</section>

<!-- FRASES 2 -->
<section class="texto">
<p id="msg2"></p>
</section>

<!-- FOTOS 2 -->
<section class="fotos">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
</section>

<!-- FINAL -->
<section class="final">
<p>
E mesmo depois de tudo isso...
</p>

<p>
eu ainda escolheria você em todas as versões da minha vida 💖
</p>

<button id="segredo" onclick="mostrar()">Clique aqui</button>

<p id="mensagemSecreta" style="display:none;">
Eu te amo ❤️
</p>

</section>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<script>

/* TEXTOS */
const texto1 = `
Desde que você entrou na minha vida,
tudo mudou.

Os dias ficaram mais leves,
e o seu sorriso virou meu lugar favorito...
`;

const texto2 = `
Cada momento com você
se tornou especial.

E eu só queria guardar tudo isso
pra sempre 💖
`;

let i = 0;
let j = 0;

/* INICIO */
function iniciar(){
document.getElementById("musica").play();
document.getElementById("texto1").scrollIntoView();
escrever1();
}

/* DIGITAÇÃO */
function escrever1(){
if(i < texto1.length){
document.getElementById("msg1").innerHTML += texto1.charAt(i);
i++;
setTimeout(escrever1,40);
} else {
setTimeout(escrever2,2000);
}
}

function escrever2(){
if(j < texto2.length){
document.getElementById("msg2").innerHTML += texto2.charAt(j);
j++;
setTimeout(escrever2,40);
}
}

/* BOTÃO SECRETO */
setTimeout(()=>{
document.getElementById("segredo").style.opacity="1";
},8000);

function mostrar(){
document.getElementById("mensagemSecreta").style.display="block";
}

/* CORAÇÕES CAINDO */
function criarCoracao(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤️";

heart.style.left = Math.random()*100 + "vw";

heart.style.fontSize = Math.random()*20 + 15 + "px";

heart.style.animationDuration = Math.random()*3 + 5 + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(criarCoracao,300);

</script>

</body>
</html>
