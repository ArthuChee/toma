<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* SEÇÕES */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
flex-direction:column;
background-size:cover;
background-position:center;
}

/* CAPA */
.capa{
height:100vh;
background:url('capa.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* TÍTULO */
h1{
font-family:'Playfair Display',serif;
font-size:50px;
color:#ffd6e0;
}

/* BOTÃO COM BATIDA */
.botao{
padding:15px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d88,#ff99ac);
color:white;
font-size:18px;
cursor:pointer;
animation:batida 1.2s infinite;
}

@keyframes batida{
0%{transform:scale(1);}
14%{transform:scale(1.15);}
28%{transform:scale(1);}
42%{transform:scale(1.15);}
70%{transform:scale(1);}
100%{transform:scale(1);}
}

/* TEXTOS */
.texto{
font-size:22px;
max-width:700px;
line-height:1.8;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
padding:25px;
border-radius:20px;
color:#ffe4ec;
}

/* FUNDOS */
.fundo1{background:url('fundo1.jpg') center/cover no-repeat;}
.fundo2{background:url('fundo2.jpg') center/cover no-repeat;}
.fundo3{background:url('fundo3.jpg') center/cover no-repeat;}
.fundo4{background:url('fundo4.jpg') center/cover no-repeat;}
.fundoFinal{background:url('fundoFinal.jpg') center/cover no-repeat;}

/* FOTOS */
.fotos img{
width:90%;
max-width:350px;
margin:10px;
border-radius:20px;
}

/* FINAL */
#segredo{
opacity:0;
margin-top:20px;
}

</style>
</head>

<body>

<!-- CAPA -->
<div class="capa">
<h1>Para Você 💖</h1>
<button class="botao" onclick="iniciar()">Abrir Carta</button>
</div>

<!-- FRASE 1 -->
<section class="fundo1">
<p class="texto" id="msg1"></p>
</section>

<!-- FOTOS 1 -->
<section class="fundo2 fotos">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</section>

<!-- FRASE 2 -->
<section class="fundo3">
<p class="texto" id="msg2"></p>
</section>

<!-- FOTOS 2 -->
<section class="fundo4 fotos">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
</section>

<!-- FINAL -->
<section class="fundoFinal">
<p class="texto">
E mesmo depois de tudo...
eu ainda escolheria você em todas as versões da minha vida 💖
</p>

<button id="segredo" onclick="mostrar()">Clique aqui</button>

<p id="mensagemSecreta" style="display:none;">
Eu te amo ❤️
</p>

</section>

<!-- ÁUDIOS -->
<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<audio id="batidaSom">
<source src="batida.mp3">
</audio>

<script>

/* TEXTOS */
const texto1 = `
Desde que você entrou na minha vida,
tudo ficou mais bonito.

Seu sorriso virou meu lugar favorito...
`;

const texto2 = `
Cada momento com você
se tornou especial.

E eu só queria viver tudo isso
pra sempre 💖
`;

let i=0, j=0;

/* INICIO */
function iniciar(){

document.getElementById("musica").play();

const batida = document.getElementById("batidaSom");
batida.volume = 0.3;
batida.play();

setTimeout(()=>{
batida.pause();
},5000);

document.querySelector(".fundo1").scrollIntoView();

escrever1();
}

/* DIGITAÇÃO */
function escrever1(){
if(i < texto1.length){
document.getElementById("msg1").innerHTML += texto1.charAt(i);
i++;
setTimeout(escrever1,40);
} else {
setTimeout(escrever2,2000);
}
}

function escrever2(){
if(j < texto2.length){
document.getElementById("msg2").innerHTML += texto2.charAt(j);
j++;
setTimeout(escrever2,40);
}
}

/* BOTÃO SECRETO */
setTimeout(()=>{
document.getElementById("segredo").style.opacity="1";
},8000);

function mostrar(){
document.getElementById("mensagemSecreta").style.display="block";
}

</script>

</body>
</html>
