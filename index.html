<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você 💖</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial;
background:black;
color:white;
}

/* SEÇÕES */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* INICIO */
.inicio{
background:url('fundo1.jpg') center/cover no-repeat;
flex-direction:column;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
}

/* TEXTO */
.texto{
background:url('fundo2.jpg') center/cover no-repeat;
position:relative;
}

.texto::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.texto p{
position:relative;
font-size:22px;
max-width:700px;
line-height:1.8;
color:#ffe4ec;
}

/* FOTOS */
.fotos{
flex-direction:column;
gap:20px;
}

.fotos img{
width:90%;
max-width:400px;
border-radius:20px;
}

/* FINAL */
.final{
flex-direction:column;
gap:20px;
font-size:22px;
}

#segredo{
opacity:0;
transition:1s;
}

</style>
</head>

<body>

<!-- INICIO -->
<section class="inicio">
<h1>Para Você 💖</h1>
<button onclick="iniciar()">Abrir Carta</button>
</section>

<!-- TEXTO INICIAL -->
<section class="texto" id="texto">
<p id="mensagem"></p>
</section>

<!-- FOTOS -->
<section class="fotos">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
</section>

<!-- TEXTO FINAL -->
<section class="final">
<p>
Talvez tudo isso não consiga explicar exatamente o que eu sinto...

mas uma coisa é certa:
</p>

<p>
eu escolheria você em todas as versões da minha vida 💖
</p>

<button id="segredo" onclick="mostrar()">Clique aqui</button>

<p id="mensagemSecreta" style="display:none;">
Eu te amo ❤️
</p>

</section>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<script>

const mensagem = `
Desde que você entrou na minha vida,
tudo ficou mais leve.

Seu sorriso virou meu lugar favorito,
e cada momento com você é especial.

Eu só queria que você soubesse isso... 💖
`;

let i = 0;

function iniciar(){
document.getElementById("musica").play();
document.getElementById("texto").scrollIntoView();
escrever();
}

function escrever(){
if(i < mensagem.length){
document.getElementById("mensagem").innerHTML += mensagem.charAt(i);
i++;
setTimeout(escrever,40);
}
}

/* BOTÃO SECRETO */
setTimeout(()=>{
document.getElementById("segredo").style.opacity = "1";
},5000);

function mostrar(){
document.getElementById("mensagemSecreta").style.display="block";
}

</script>

</body>
</html>
