<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você 💖</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* TELA INICIAL */
.inicio{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('fundo1.jpg') center/cover no-repeat;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
}

/* PARTE TEXTO */
.parte-texto{
    position:relative;
    width:100%;
    min-height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:url('fundo2.jpg') center/cover no-repeat;
}

.parte-texto::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.conteudo-texto{
    position:relative;
    z-index:2;
    max-width:700px;
    padding:20px;
    font-size:22px;
    line-height:1.8;
    color:#ffe4ec;
}

/* PARTE FOTOS */
.parte-fotos{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:black;
}

.slideshow{
    width:300px;
    height:400px;
    position:relative;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:20px;
    opacity:0;
    transition:1s;
}

.slide.active{opacity:1;}

/* FINAL */
.parte-final{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:black;
    color:#ffd6e0;
    font-size:24px;
}

</style>
</head>

<body>

<!-- TELA INICIAL -->
<div class="inicio">
    <button onclick="abrir()">Abrir Carta 💌</button>
</div>

<!-- TEXTO -->
<div class="parte-texto" id="textoParte">
    <div class="conteudo-texto">
        <p id="texto"></p>
    </div>
</div>

<!-- FOTOS -->
<div class="parte-fotos" id="fotosParte">
    <div class="slideshow">
        <img class="slide active" src="foto1.jpg">
        <img class="slide" src="foto2.jpg">
        <img class="slide" src="foto3.jpg">
        <img class="slide" src="foto4.jpg">
    </div>
</div>

<!-- FINAL -->
<div class="parte-final" id="finalParte">
    <p>
        E se eu pudesse escolher de novo... escolheria você todas as vezes 💖
    </p>
</div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<script>

/* ✍️ ESCREVE SUA MENSAGEM AQUI */
const mensagem = `
Coloca aqui suas palavras...

do seu jeito

isso que vai aparecer primeiro 💖
`;

let i = 0;

function abrir(){
    document.querySelector(".inicio").style.display="none";
    document.getElementById("textoParte").style.display="flex";
    document.getElementById("musica").play();
    escrever();
}

function escrever(){
    if(i < mensagem.length){
        document.getElementById("texto").innerHTML += mensagem.charAt(i);
        i++;
        setTimeout(escrever,40);
    } else {
        setTimeout(mostrarFotos,2000);
    }
}

function mostrarFotos(){
    document.getElementById("textoParte").style.display="none";
    document.getElementById("fotosParte").style.display="flex";

    setTimeout(mostrarFinal,10000);
}

function mostrarFinal(){
    document.getElementById("fotosParte").style.display="none";
    document.getElementById("finalParte").style.display="flex";
}

/* SLIDES */
const slides=document.querySelectorAll(".slide");
let slideAtual=0;

setInterval(()=>{
slides[slideAtual].classList.remove("active");
slideAtual=(slideAtual+1)%slides.length;
slides[slideAtual].classList.add("active");
},3000);

</script>

</body>
</html>
